name: Sync Subscription

on:
  schedule:
    - cron: '0 */6 * * *'    # 每6小时同步一次（UTC时间）
  workflow_dispatch:         # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          fetch-depth: 0

      - name: Fetch subscription
        run: |
          curl -fsSL -o sub.txt \
            "https://kuang3.bas5672.ccwu.cc/sub?token=94ac83d464012db1ead10968afbee029"
          
          # 验证文件是否为空
          if [ ! -s sub.txt ]; then
            echo "Error: Downloaded file is empty"
            exit 1
          fi
          
          # 统计节点数量
          count=$(grep -c '^vless://' sub.txt || echo "0")
          echo "Fetched $count nodes"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sub.txt
          
          # 只有文件变更时才提交
          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "sync: update subscription $(date +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
