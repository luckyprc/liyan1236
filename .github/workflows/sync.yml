name: Cellular Sub Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch & Optimize
        env:
          SUB_URL: ${{ secrets.SUB_URL }}
        run: python3 sync.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --cached --quiet || git commit -m "sync: cellular subs $(date +%Y-%m-%d-%H:%M)"
          git push
