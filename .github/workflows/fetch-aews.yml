name: Fetch aews/jd Latest

on:
  schedule:
    - cron: '0 1 * * *'   # 北京时间每天 9:00
    - cron: '0 5 * * *'   # 北京时间每天 13:00
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect latest v2 file
        id: detect
        run: |
          # 调用 GitHub API 获取目录，jq 过滤 v2xxxx.txt，版本排序取最新
          LATEST=$(curl -sL \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/aews/jd/contents/ | \
            jq -r '.[].name | select(test("^v2[0-9]{4}\\.txt$"))' | \
            sort -V | tail -n 1)
          
          if [ -z "$LATEST" ]; then
            echo "No v2 file found, exit."
            exit 1
          fi
          
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "Found: $LATEST"

      - name: Download content
        run: |
          FILE="${{ steps.detect.outputs.latest }}"
          URL="https://gcore.jsdelivr.net/gh/aews/jd/${FILE}"
          
          echo "Downloading ${URL} ..."
          curl -sL --fail "$URL" -o aews_raw.txt
          
          # 如果内容是 base64（纯字母数字+/=），自动解码；否则直接保留
          if head -c 100 aews_raw.txt | grep -qE '^[A-Za-z0-9+/=]+$'; then
            echo "Detected base64, decoding..."
            base64 -d aews_raw.txt > sub.txt || cp aews_raw.txt sub.txt
          else
            cp aews_raw.txt sub.txt
          fi
          
          # 可选：去重、去空行
          sed -i '/^$/d' sub.txt

      - name: Push to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sub.txt
          git diff --cached --quiet || \
            (git commit -m "Auto sync aews/jd ${{ steps.detect.outputs.latest }} $(date +%Y%m%d)" && git push)
